<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <title>Мемори: Профи и неговите помощници</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive;
            background-color: #eef2f3;
            text-align: center;
        }

        h1 {
            color: #4a90e2;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            gap: 15px;
            justify-content: center;
            margin: 20px auto;
            max-width: 700px;
        }

        .card {
            width: 150px;
            height: 150px;
            background-color: #ff9f43;
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-back {
            background-color: #ff9f43;
            color: white;
            font-size: 50px;
        }

        .card-front {
            background-color: white;
            transform: rotateY(180deg);
        }

        .card-front img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        #win-message {
            display: none;
            font-size: 40px;
            color: #10ac84;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>Мемори: Свържи Профи с неговия инструмент!</h1>
    <p>Кликни на картите и намери двойките.</p>

    <div class="game-board" id="board"></div>
    <div id="win-message">СТРАХОТНО! ТИ ИМАШ СУПЕР ПАМЕТ! 🏆🎉</div>

    <script>
        const cardsData = [
            { id: 'lekar', img: 'lekar-profi.jpg' }, { id: 'lekar', img: 'lekar-instrument.jpg' },
            { id: 'pekar', img: 'pekar-profi.jpg' }, { id: 'pekar', img: 'pekar-instrument.jpg' },
            { id: 'stroitel', img: 'stroitel-profi.jpg' }, { id: 'stroitel', img: 'stroitel-instrument.jpg' },
            { id: 'fire', img: 'pozharnikar-profi.jpg' }, { id: 'fire', img: 'pozharnikar-instrument.jpg' },
            { id: 'uchitel', img: 'uchitel-profi.jpg' }, { id: 'uchitel', img: 'uchitel-instrument.jpg' },
            { id: 'policai', img: 'policai-profi.jpg' }, { id: 'policai', img: 'policai-instrument.jpg' }
        ];

        let flippedCards = [];
        let matchedPairs = 0;

        // Разбъркване на картите
        cardsData.sort(() => Math.random() - 0.5);

        const board = document.getElementById('board');

        cardsData.forEach((data, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.id = data.id;
            card.innerHTML = `
                <div class="card-back">?</div>
                <div class="card-front"><img src="images/${data.img}" alt="card image"></div>
            `;
            card.addEventListener('click', flipCard);
            board.appendChild(card);
        });

        function flipCard() {
            if (flippedCards.length < 2 && !this.classList.contains('flipped')) {
                this.classList.add('flipped');
                flippedCards.push(this);

                if (flippedCards.length === 2) {
                    setTimeout(checkMatch, 1000);
                }
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.id === card2.dataset.id) {
                matchedPairs++;
                if (matchedPairs === 6) {
                    document.getElementById('win-message').style.display = 'block';
                }
            } else {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
            }
            flippedCards = [];
        }
    </script>
</body>

</html>
