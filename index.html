<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Професиите на Профи</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ff6b6b;
            font-size: 36px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .drop-zone {
            width: 160px;
            height: 220px;
            background-color: #ffffff;
            border: 5px dashed #ccc;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-size: 22px;
            font-weight: bold;
            padding-top: 15px;
            transition: background-color 0.3s;
        }

        .drop-zone.hovered {
            background-color: #e0ffd4;
            border-color: #4cd137;
        }

        /* Цветове за всяка професия */
        #doctor-zone {
            border-color: #00a8ff;
            color: #00a8ff;
        }

        #baker-zone {
            border-color: #e1b12c;
            color: #e1b12c;
        }

        #builder-zone {
            border-color: #e84118;
            color: #e84118;
        }

        #fire-zone {
            border-color: #c23616;
            color: #c23616;
        }

        #teacher-zone {
            border-color: #9c88ff;
            color: #9c88ff;
        }

        /* Лилаво за учителя */
        #police-zone {
            border-color: #273c75;
            color: #273c75;
        }

        /* Тъмносиньо за полицая */

        .tools-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            background-color: #fffacd;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .draggable {
            width: 100px;
            height: 100px;
            background-color: #ffffff;
            border: 3px solid #353b48;
            border-radius: 15px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .draggable img {
            max-width: 90%;
            max-height: 90%;
            pointer-events: none;
            /* Много важно, за да работи влаченето гладко */
        }

        .draggable:active {
            cursor: grabbing;
        }

        #success-message {
            display: none;
            font-size: 40px;
            color: #4cd137;
            margin-top: 30px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }
    </style>
</head>

<body>

    <h1>Намери инструментите на Профи!</h1>

    <div class="container">
        <div class="drop-zone" id="doctor-zone" data-job="doctor">Лекар</div>
        <div class="drop-zone" id="baker-zone" data-job="baker">Пекар</div>
        <div class="drop-zone" id="builder-zone" data-job="builder">Строител</div>
        <div class="drop-zone" id="fire-zone" data-job="fire">Пожарникар</div>
        <div class="drop-zone" id="teacher-zone" data-job="teacher">Учител</div>
        <div class="drop-zone" id="police-zone" data-job="police">Полицай</div>
    </div>

    <div class="tools-container" id="tools-box">
        <div class="draggable" draggable="true" data-job="teacher" id="tool-teacher">
            <img src="images//uchitel-instrument.jpg" alt="Инструмент за учител">
        </div>
        <div class="draggable" draggable="true" data-job="baker" id="tool-baker">
            <img src="images//pekar-instrument.jpg" alt="Инструмент за пекар">
        </div>
        <div class="draggable" draggable="true" data-job="police" id="tool-police">
            <img src="images//policai-instrument.jpg" alt="Инструмент за полицай">
        </div>
        <div class="draggable" draggable="true" data-job="fire" id="tool-fire">
            <img src="images//pozharnikar-instrument.jpg" alt="Инструмент за пожарникар">
        </div>
        <div class="draggable" draggable="true" data-job="doctor" id="tool-doctor">
            <img src="images//lekar-instrument.jpg" alt="Инструмент за лекар">
        </div>
        <div class="draggable" draggable="true" data-job="builder" id="tool-builder">
            <img src="images//stroitel-instrument.jpg" alt="Инструмент за строител">
        </div>
    </div>

    <div id="success-message">БРАВО! ТИ СЕ СПРАВИ ЧУДЕСНО! 🎉🌟</div>

    <script>
        const draggables = document.querySelectorAll('.draggable');
        const dropZones = document.querySelectorAll('.drop-zone');
        let matchedCount = 0;

        draggables.forEach(draggable => {
            draggable.addEventListener('dragstart', () => { draggable.classList.add('dragging'); });
            draggable.addEventListener('dragend', () => { draggable.classList.remove('dragging'); });
        });

        dropZones.forEach(zone => {
            zone.addEventListener('dragover', e => {
                e.preventDefault();
                zone.classList.add('hovered');
            });
            zone.addEventListener('dragleave', () => { zone.classList.remove('hovered'); });
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('hovered');

                const draggable = document.querySelector('.dragging');
                if (draggable.getAttribute('data-job') === zone.getAttribute('data-job')) {
                    zone.appendChild(draggable);
                    draggable.setAttribute('draggable', 'false');
                    draggable.style.cursor = 'default';
                    matchedCount++;

                    // Обновено на 6, за да отчете всички картинки
                    if (matchedCount === 6) {
                        document.getElementById('success-message').style.display = 'block';
                    }
                } else {
                    zone.style.backgroundColor = '#ffcccc';
                    setTimeout(() => { zone.style.backgroundColor = '#ffffff'; }, 500);
                }
            });
        });
    </script>
</body>

</html>
